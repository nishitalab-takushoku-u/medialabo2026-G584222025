<!-- 課題1-4: プロジェクト課題の検索結果を表示する HTML をここに記述してください．-->
<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>My test page</title>
  </head>
  <body>
    <h1>世界の天気</h1>
    <script src="weather.js" defer></script>
    <h2>以下の地域の天候に関する情報を検索して表示します</h2>
    <label for="shimei">検索キー：</label>
	     <input type="text" name="shimei" size="10" id="shimei">
       <button id="kekka">検索</button>

       <br>
       <p>知りたい情報を選んでください</p>
       <input type="checkbox" id="city">都市名
       <input type="checkbox" id="lat">緯度
       <input type="checkbox" id="lon">経度
       <input type="checkbox" id="weather">天気
       <br>
       <input type="checkbox" id="temp">気温
       <input type="checkbox" id="temp_min">最低気温
       <input type="checkbox" id="temp_max">最高気温
       <br>
       <input type="checkbox" id="humidity">湿度
       <input type="checkbox" id="speed">風速
       <input type="checkbox" id="deg">風向

    <div class="zentai">
    <ul>
        
    </ul>
    </div>
    
  </body>
</html>
